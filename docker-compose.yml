services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: merouni_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Use the container name "postgres" as the host
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mero_universitat
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  postgres:
    image: postgres:16-alpine
    container_name: merouni_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mero_universitat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
